# ============================================================
# CodeNexus Unified Docker Compose
# ============================================================

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: devanshbehl
      POSTGRES_PASSWORD: devansh
      POSTGRES_DB: codenexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app-redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - app-redis-data:/data

  # ============================================================
  # Judge0 CE — Self-Hosted Code Execution Engine
  # ============================================================
  judge0-server:
    image: judge0/judge0:latest
    container_name: judge0-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:2358:2358"          # Bind to localhost ONLY — not publicly accessible
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_HOST: judge0-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      ALLOW_ENABLE_WAIT_RESULT: "true"
      ENABLE_BATCHED_SUBMISSIONS: "false"
      MAX_QUEUE_SIZE: 100
      MAX_CPU_TIME_LIMIT: 15
      MAX_MEMORY_LIMIT: 512000
      RAILS_ENV: production
      RAILS_MAX_THREADS: 8
    privileged: true
    depends_on:
      judge0-redis:
        condition: service_healthy
      judge0-postgres:
        condition: service_healthy
    networks:
      - judge0-net

  judge0-workers:
    image: judge0/judge0:latest
    restart: unless-stopped
    command: ["./scripts/workers"]
    deploy:
      replicas: 4
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_HOST: judge0-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      ALLOW_ENABLE_WAIT_RESULT: "true"
      ENABLE_BATCHED_SUBMISSIONS: "false"
      MAX_QUEUE_SIZE: 100
      MAX_CPU_TIME_LIMIT: 15
      MAX_MEMORY_LIMIT: 512000
      RAILS_ENV: production
    privileged: true
    depends_on:
      judge0-redis:
        condition: service_healthy
      judge0-postgres:
        condition: service_healthy
    networks:
      - judge0-net

  judge0-redis:
    image: redis:7-alpine
    container_name: judge0-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - judge0-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - judge0-net

  judge0-postgres:
    image: postgres:15-alpine
    container_name: judge0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
    volumes:
      - judge0-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - judge0-net

networks:
  judge0-net:
    driver: bridge

volumes:
  pgdata:
  app-redis-data:
  judge0-redis-data:
  judge0-pg-data: